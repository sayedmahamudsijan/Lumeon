<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumeon - Pepper Spray</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <style>
        /* Ensure images are properly displayed */
        .slider-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            max-width: 300px;
            overflow: hidden;
        }

        .product-image {
            width: 100%;
            display: none;
            transition: opacity 0.5s ease-in-out;
        }

        .product-image.active {
            display: block;
        }

        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        .prev { left: 10px; }
        .next { right: 10px; }
    </style>
</head>
<body>
    <!-- Dark/Light Mode Toggle -->
    <button id="theme-toggle" onclick="toggleTheme()">🌙</button>

    <!-- Header with Logo -->
    <header>
        <img src="lumeon.jpg" alt="Lumeon Logo" id="logo" style="width: 50px; height: auto;">
        <h1><a href="https://www.facebook.com/profile.php?id=61573501816900" target="_blank">Lumeon</a></h1>
    </header>

    <!-- Spiral Navigation -->
    <section id="spiral-nav">
        <button class="spiral-button" onclick="startSpiral()">Shop Now</button>
    </section>

    <!-- Product Section -->
    <section id="product">
        <h2>Pepper Spray - Stay Safe</h2>

        <!-- Image Media with Slider Navigation -->
        <section id="image-media">
            <h3>Product Images</h3>
            <div class="slider-container">
                <button class="prev" onclick="changeSlide(-1)">&#10094;</button>

                <img src="vps1.jpg" alt="Pepper Spray Image 1" class="product-image active">
                <img src="vps2.jpg" alt="Pepper Spray Image 2" class="product-image">

                <button class="next" onclick="changeSlide(1)">&#10095;</button>
            </div>
        </section>

        <p>Compact, effective, and easy to carry. Protect yourself anytime, anywhere.</p>
        <span>Price: 800 BDT</span>

        <button onclick="addToCart()">Add to Cart</button>

        <!-- Buy Now Button Redirecting to Messenger -->
        <a href="https://m.me/61573501816900" target="_blank">
            <button>Buy Now</button>
        </a>
    </section>

    <!-- Cart & Checkout -->
    <section id="cart">
        <h2>Shopping Cart</h2>
        <div id="cart-items"></div>
        <input type="text" id="coupon" placeholder="Enter Coupon Code">
        <button onclick="applyCoupon()">Apply Coupon</button>
        <button onclick="checkout()">Checkout</button>
    </section>

    <!-- Messenger Integration -->
    <footer>
        <a href="https://m.me/61573501816900" target="_blank">Contact Us on Messenger</a>
    </footer>

    <script>
        // Toggle Dark/Light Mode
        function toggleTheme() {
            const currentTheme = document.body.classList.contains("dark-mode");
            document.body.classList.toggle("dark-mode", !currentTheme);
            document.getElementById("theme-toggle").textContent = currentTheme ? "🌙" : "🌞";
        }

        // Image Slider Functionality
        let currentIndex = 0;
        const images = document.querySelectorAll(".product-image");

        function changeSlide(direction) {
            images[currentIndex].classList.remove("active");
            currentIndex = (currentIndex + direction + images.length) % images.length;
            images[currentIndex].classList.add("active");
        }

        // Spiral Navigation (Placeholder)
        function startSpiral() {
            alert("Spiral navigation not implemented yet.");
        }

        // Cart Functionality
        let cart = [];

        function addToCart() {
            cart.push({ name: "Pepper Spray", price: 800 });
            displayCart();
        }

        function displayCart() {
            const cartItems = document.getElementById("cart-items");
            cartItems.innerHTML = "";
            cart.forEach(item => {
                const div = document.createElement("div");
                div.textContent = `${item.name} - $${item.price}`;
                cartItems.appendChild(div);
            });
        }

        // Apply Coupon (Placeholder)
        function applyCoupon() {
            const couponCode = document.getElementById("coupon").value;
            if (couponCode === "LUMEON10") {
                alert("Coupon applied! 10% off.");
            } else {
                alert("Invalid coupon code.");
            }
        }

        // Checkout (Placeholder)
        function checkout() {
            alert("Proceeding to checkout.");
        }
    </script>
</body>
</html>
